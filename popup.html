<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 420px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1d23;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      color: #00d4aa;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 .logo { font-size: 20px; }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .status.ok { background: #0d3320; color: #00d4aa; }
    .status.err { background: #3d1515; color: #ff6b6b; }
    .status.info { background: #1a2a3d; color: #6bb3ff; }

    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
      margin-top: 10px;
    }
    select, input[type="datetime-local"], input[type="date"], input[type="number"], input[type="text"] {
      width: 100%;
      min-width: 0;
      padding: 8px 10px;
      background: #2a2d35;
      border: 1px solid #3a3d45;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
      box-sizing: border-box;
    }
    select:focus, input:focus {
      border-color: #00d4aa;
    }

    .row {
      display: flex;
      gap: 8px;
    }
    .row > * { flex: 1; min-width: 0; }

    .section {
      background: #22252d;
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #ccc;
      margin-bottom: 8px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: #00d4aa; color: #1a1d23; }
    .btn-secondary { background: #2a4a3d; color: #00d4aa; }
    .btn-outline {
      background: transparent;
      border: 1px solid #3a3d45;
      color: #aaa;
    }

    .progress {
      margin-top: 8px;
      font-size: 12px;
      color: #888;
    }
    .progress-bar {
      height: 4px;
      background: #2a2d35;
      border-radius: 2px;
      margin-top: 4px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #00d4aa;
      border-radius: 2px;
      transition: width 0.3s;
      width: 0%;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
    }
    .checkbox-row input[type="checkbox"] { width: auto; }
    .checkbox-row label { margin: 0; color: #ccc; }

    .hidden { display: none; }
    .account-list {
      max-height: 150px;
      overflow-y: auto;
      margin-top: 6px;
    }
    .account-list .checkbox-row {
      padding: 2px 0;
    }
    .small-text { font-size: 11px; color: #666; margin-top: 4px; }
  </style>
</head>
<body>
  <h1><span class="logo">⬡</span> Haruko Data Extractor</h1>

  <div id="statusBar" class="status info">Checking connection...</div>

  <!-- Data Type -->
  <div class="section">
    <div class="section-title">Data Type</div>
    <select id="dataType">
      <option value="equity_timeseries" selected>Equity &amp; Holdings (Daily EOD)</option>
      <option value="wallet_transactions">On-Chain Transactions</option>
      <option value="trades">Trades</option>
      <option value="transfers">Transfers</option>
      <option value="balance_adjustments">Balance Adjustments</option>
      <option value="balance">Balances (Live Snapshot)</option>
      <option value="position">Positions (Live Snapshot)</option>
    </select>
  </div>

  <!-- Group & Detail Level (for timeseries) -->
  <div class="section hidden" id="groupSection">
    <div class="section-title">Group</div>
    <input type="text" id="groupName" value="" placeholder="e.g. Open Eden Vault">
    <div class="small-text">Auto-detected from page URL</div>

    <label style="margin-top:10px;">Detail Level</label>
    <select id="detailLevel">
      <option value="expand_account" selected>Expand by Account — one row per asset per account per day</option>
      <option value="expand_asset">Expand by Asset — one row per asset per day</option>
      <option value="collapse">Collapse All — one row per day (totals only)</option>
    </select>

    <div class="row" style="margin-top:10px;">
      <div>
        <label>From</label>
        <input type="date" id="eodStartDate">
      </div>
      <div>
        <label>To</label>
        <input type="date" id="eodEndDate">
      </div>
    </div>
    <div class="small-text">Leave blank for all available dates</div>
  </div>

  <!-- Date Range -->
  <div class="section" id="dateSection">
    <div class="section-title">Date Range</div>
    <div id="lookupMode">
      <div class="row">
        <div>
          <label>Mode</label>
          <select id="mode">
            <option value="latest">Latest N Records</option>
            <option value="historical">Date Range</option>
          </select>
        </div>
        <div id="latestCount">
          <label>Count</label>
          <input type="number" id="count" value="1000" min="1" max="50000">
        </div>
      </div>
    </div>
    <div id="dateRange" class="hidden">
      <div class="row">
        <div>
          <label>From</label>
          <input type="date" id="startDate">
        </div>
        <div>
          <label>To</label>
          <input type="date" id="endDate">
        </div>
      </div>
    </div>
  </div>

  <!-- Accounts -->
  <div class="section" id="accountSection">
    <div class="section-title">Accounts</div>
    <div class="row" style="margin-bottom: 6px;">
      <button class="btn-outline" id="selectAll" style="margin-top:0; padding:5px;">Select All</button>
      <button class="btn-outline" id="clearAll" style="margin-top:0; padding:5px;">Clear All</button>
    </div>
    <div id="accountList" class="account-list">
      <div class="small-text">Loading accounts...</div>
    </div>
  </div>

  <!-- Actions -->
  <button class="btn-primary" id="downloadBtn" disabled>Download CSV</button>

  <div id="progressSection" class="hidden">
    <div class="progress" id="progressText">Fetching data...</div>
    <div class="progress-bar">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
